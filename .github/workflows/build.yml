name: Build TWRP for Smart 8
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Sync TWRP Source
        run: |
          mkdir twrp && cd twrp
          git config --global user.email "gar@example.com"
          git config --global user.name "Gar"
          ~/bin/repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          ~/bin/repo sync -j$(nproc)

      - name: Clone Device Tree
        run: |
          cd twrp
          git clone https://github.com/twrpdtgen/android_device_infinix_Infinix-X6525 device/infinix/Infinix-X6525

      - name: Hard Fix AndroidProducts
        run: |
          cd twrp/device/infinix/Infinix-X6525
          rm -f vendorsetup.sh
          # Re-write AndroidProducts.mk with clean format
          echo 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/omni_Infinix-X6525.mk' > AndroidProducts.mk
          echo '' >> AndroidProducts.mk
          echo 'COMMON_LUNCH_CHOICES := \' >> AndroidProducts.mk
          echo '    omni_Infinix-X6525-user \' >> AndroidProducts.mk
          echo '    omni_Infinix-X6525-userdebug \' >> AndroidProducts.mk
          echo '    omni_Infinix-X6525-eng' >> AndroidProducts.mk

      - name: Build Recovery
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch omni_Infinix-X6525-eng
          # Base sa BoardConfig.mk mo
          mka bootimage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Smart8-Final
          path: twrp/out/target/product/Infinix-X6525/boot.img
