name: Build TWRP for Smart 8
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Sync TWRP Source
        run: |
          mkdir twrp && cd twrp
          git config --global user.email "gar@example.com"
          git config --global user.name "Gar"
          ~/bin/repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          ~/bin/repo sync -j$(nproc)

      - name: Clone and Patch Device Tree
        run: |
          cd twrp
          git clone https://github.com/twrpdtgen/android_device_infinix_Infinix-X6525 device/infinix/X6525
          cd device/infinix/X6525
          
          # 1. Burahin ang mga problematic files para gumawa ng bago
          rm -f device.mk omni_Infinix-X6525.mk AndroidProducts.mk
          
          # 2. Gagawa ng MALINIS na device.mk (walang static boot control error)
          echo 'LOCAL_PATH := device/infinix/X6525' > device.mk
          echo 'PRODUCT_PACKAGES += android.hardware.boot@1.0-impl android.hardware.boot@1.0-service' >> device.mk
          echo 'PRODUCT_PACKAGES += update_engine update_verifier' >> device.mk
          echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/full_base.mk)' >> device.mk
          
          # 3. Gagawa ng malinis na omni_X6525.mk
          echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/core_64bit.mk)' > omni_X6525.mk
          echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/full_base_telephony.mk)' >> omni_X6525.mk
          echo '$(call inherit-product, device/infinix/X6525/device.mk)' >> omni_X6525.mk
          echo 'PRODUCT_DEVICE := X6525' >> omni_X6525.mk
          echo 'PRODUCT_NAME := omni_X6525' >> omni_X6525.mk
          echo 'PRODUCT_BRAND := Infinix' >> omni_X6525.mk
          echo 'PRODUCT_MODEL := Smart 8' >> omni_X6525.mk
          
          # 4. Gagawa ng malinis na AndroidProducts.mk
          echo 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/omni_X6525.mk' > AndroidProducts.mk
          echo 'COMMON_LUNCH_CHOICES := omni_X6525-eng' >> AndroidProducts.mk
          
          # 5. I-patch ang BoardConfig path
          sed -i 's/device\/infinix\/Infinix-X6525/device\/infinix\/X6525/g' BoardConfig.mk

      - name: Build Recovery
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch omni_X6525-eng
          mka bootimage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Smart8-X6525
          path: twrp/out/target/product/X6525/boot.img
